<div class="min-h-screen bg-slate-950 flex items-center justify-center px-6">

    <div class="text-center max-w-xl">

        <!-- 404 -->
        <h1 class="text-8xl md:text-9xl font-bold text-blue-500 tracking-tight">
            404
        </h1>

        <!-- Title -->
        <h2 class="mt-6 text-2xl md:text-3xl font-semibold text-slate-100">
            Page Not Found
        </h2>

        <!-- Description -->
        <p class="mt-4 text-slate-400 leading-relaxed">
            The page you are looking for may have been removed,
            renamed, or is temporarily unavailable.
        </p>

        <!-- Button -->
        <button (click)="goHome()" class="mt-8 inline-flex items-center px-6 py-3
             bg-blue-600 text-white text-sm font-medium
             rounded-md shadow-md
             hover:bg-blue-700
             transition duration-200">
            Go Back Home
        </button>

    </div>

</div>
