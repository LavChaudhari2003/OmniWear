<div class="flex flex-wrap justify-center gap-6">
    @for (product of productStore.products(); track product.id) {
    <div class="w-64 sm:w-72 h-96 sm:h-104 p-3 flex flex-col rounded-lg shadow-md">
        <div class="overflow-hidden rounded-b-md flex items-center justify-center h-44 sm:h-52 md:h-60 lg:h-64">
            <img class="rounded-md mx-auto w-full h-full object-contain max-h-44 sm:max-h-52 md:max-h-60 lg:max-h-64 transition-transform duration-300 ease-in-out transform hover:scale-105"
                [src]="'../../../../assets/images/' + product.product_img" [alt]=product.product_name>
        </div>
        <div class="p-4 text-center flex-1 flex flex-col justify-between">
            <h5 class="font-semibold"><a href="#" class="text-black hover:text-black no-underline"></a>{{
                product.product_name }}</h5>
            <p class="text-base font-normal mt-1">{{ product.price | currency }}</p>
            @if (product.rating || 0 > 0) {
                <app-ratings [score]="product.rating || 0"></app-ratings>
            }
            
        </div>
    </div>
    }

</div>
