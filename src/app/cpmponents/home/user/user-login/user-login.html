<section
    class="min-h-[calc(100vh-84px)] flex items-center justify-center px-4 py-8 sm:px-6 bg-[radial-gradient(circle_at_15%_20%,rgba(251,191,36,0.18),transparent_32%),radial-gradient(circle_at_85%_80%,rgba(17,24,39,0.16),transparent_30%),#f8fafc]">
    <div class="w-full max-w-md rounded-2xl border border-gray-200 bg-white p-5 sm:p-7 shadow-[0_18px_40px_rgba(17,24,39,0.12)]">
        <header class="mb-5">
            <h1 class="m-0 text-[1.8rem] leading-tight font-bold text-gray-900 sm:text-[1.9rem]">Welcome Back</h1>
            <p class="mt-2 mb-0 text-[0.95rem] text-gray-500">Sign in to continue your OmniWear shopping.</p>
        </header>

        <form class="flex flex-col gap-4" (ngSubmit)="onSubmit()" [formGroup]="userLoginForm" novalidate>
            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-gray-700" for="email">Email</label>
                <input
                    class="w-full rounded-xl border border-gray-300 px-3.5 py-3 text-[0.96rem] text-gray-900 outline-none transition focus:border-gray-900 focus:ring-4 focus:ring-gray-900/10"
                    type="email" id="email" formControlName="email" placeholder="you@example.com" />
                @if (email?.touched && email?.invalid) {
                <small class="text-xs leading-tight text-red-600">Please enter a valid email address.</small>
                }
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-gray-700" for="password">Password</label>
                <input
                    class="w-full rounded-xl border border-gray-300 px-3.5 py-3 text-[0.96rem] text-gray-900 outline-none transition focus:border-gray-900 focus:ring-4 focus:ring-gray-900/10"
                    type="password" id="password" formControlName="password" placeholder="Enter password" />
                @if (password?.touched && password?.invalid) {
                <small class="text-xs leading-tight text-red-600">Password is required.</small>
                }
            </div>

            <button
                class="mt-1 rounded-xl bg-amber-400 px-4 py-3 text-[0.98rem] font-bold text-gray-900 transition hover:bg-amber-500 active:translate-y-px disabled:cursor-not-allowed disabled:bg-gray-300 disabled:text-gray-500"
                type="submit" [disabled]="!userLoginForm.valid">Sign In</button>

            <div class="text-sm text-gray-600">
                Not a member? <a routerLink="/home/signup" class="font-semibold text-gray-900 underline decoration-amber-400 underline-offset-4 hover:text-black">Join now</a>
            </div>

              @if(alertMessage !== '') {
                <div class="px-4 py-3 rounded-lg text-sm text-center" [ngClass]="{
                    'bg-green-100 border border-green-400 text-green-700': alertType === 0,
                    'bg-red-100 border border-red-400 text-red-700': alertType !== 0,
                }" >
                    {{ alertMessage }}
                </div>
            }

        </form>
    </div>
</section>
